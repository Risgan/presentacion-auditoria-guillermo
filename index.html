<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Informe de Auditoría — Servicios Especializados en Reproducción Asistida SAS 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0d1117;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* ── TOP BAR ─────────────────────────────────── */
        .top-bar {
            height: 50px;
            background: #161b22;
            border-bottom: 1px solid #21262d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            flex-shrink: 0;
            gap: 1rem;
        }
        .top-bar-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #58a6ff;
            font-size: 0.82rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .top-bar-title {
            flex: 1;
            text-align: center;
            color: #c9d1d9;
            font-size: 0.85rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .top-bar-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .btn-icon {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 0.78rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .btn-icon:hover { background: #30363d; color: #c9d1d9; }

        /* ── STAGE ───────────────────────────────────── */
        .stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #161b22 0%, #0d1117 100%);
        }

        .slide-wrapper {
            transform-origin: center center;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .slide-wrapper.fade-out {
            opacity: 0;
            transform: scale(0.98) translateX(-8px);
        }
        .slide-wrapper.fade-in-right {
            opacity: 0;
            transform: scale(0.98) translateX(8px);
        }

        .slide-frame {
            width: 1280px;
            height: 720px;
            border: none;
            display: block;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255,255,255,0.05);
        }

        /* Side arrows */
        .arrow-side {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.35);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 20;
        }
        .arrow-side:hover:not(:disabled) {
            background: rgba(88, 166, 255, 0.25);
            border-color: rgba(88, 166, 255, 0.5);
            color: #fff;
            transform: translateY(-50%) scale(1.1);
        }
        .arrow-side:disabled { opacity: 0; pointer-events: none; }
        .arrow-side.left  { left: 16px; }
        .arrow-side.right { right: 16px; }

        /* ── BOTTOM NAV ──────────────────────────────── */
        .bottom-nav {
            height: 62px;
            background: #161b22;
            border-top: 1px solid #21262d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            flex-shrink: 0;
            gap: 1rem;
        }

        .nav-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s, transform 0.1s;
            flex-shrink: 0;
        }
        .nav-btn:hover:not(:disabled) {
            background: #1e3a8a;
            border-color: #3b82f6;
            color: #fff;
        }
        .nav-btn:active:not(:disabled) { transform: scale(0.93); }
        .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

        .dots-container {
            display: flex;
            gap: 5px;
            align-items: center;
            flex: 1;
            justify-content: center;
            flex-wrap: wrap;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #30363d;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid transparent;
        }
        .dot:hover:not(.active) {
            background: #58a6ff;
            transform: scale(1.2);
        }
        .dot.active {
            background: #3b82f6;
            width: 22px;
            border-radius: 4px;
            border-color: #60a5fa;
        }
        .dot[data-tooltip] { position: relative; }

        .slide-counter {
            color: #484f58;
            font-size: 0.82rem;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .slide-counter .curr { color: #c9d1d9; font-weight: 600; }

        /* ── TOOLTIP on dots ─────────────────────────── */
        .dot::after {
            content: attr(data-title);
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: #161b22;
            color: #c9d1d9;
            font-size: 0.72rem;
            white-space: nowrap;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #30363d;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .dot:hover::after { opacity: 1; }

        /* ── KEYBOARD HINT ───────────────────────────── */
        .kbd-hint {
            color: #484f58;
            font-size: 0.72rem;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        kbd {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.68rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-brand">
            <i class="fa-solid fa-hospital-user"></i>
            SERA SAS · Auditoría 2025
        </div>
        <div class="top-bar-title" id="slideTitle">Portada Informe Auditoría</div>
        <div class="top-bar-actions">
            <button class="btn-icon" id="btnFullscreen" onclick="toggleFullscreen()">
                <i class="fa-solid fa-expand"></i> Pantalla completa
            </button>
        </div>
    </div>

    <!-- STAGE -->
    <div class="stage">
        <button class="arrow-side left"  id="arrowLeft"  onclick="navigate(-1)" title="Anterior (←)">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <div class="slide-wrapper" id="slideWrapper">
            <iframe class="slide-frame" id="slideFrame" src="slide01.html" title="Slide"></iframe>
        </div>

        <button class="arrow-side right" id="arrowRight" onclick="navigate(1)"  title="Siguiente (→)">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button class="nav-btn" id="btnPrev" onclick="navigate(-1)" title="Anterior">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div class="dots-container" id="dotsContainer"></div>

        <div class="slide-counter">
            <span class="curr" id="currNum">1</span>&nbsp;/&nbsp;<span id="totNum">10</span>
        </div>

        <button class="nav-btn" id="btnNext" onclick="navigate(1)" title="Siguiente">
            <i class="fa-solid fa-arrow-right"></i>
        </button>

        <div class="kbd-hint">
            <kbd>←</kbd><kbd>→</kbd> navegar
        </div>
    </div>

    <script>
        const slides = [
            { file: 'slide01.html', title: 'Portada Informe Auditoría' },
            { file: 'slide02.html', title: 'Hallazgos Críticos — Semáforo' },
            { file: 'slide03.html', title: 'Resumen Ejecutivo' },
            { file: 'slide04.html', title: 'I. Evaluación de Negocio en Marcha' },
            { file: 'slide05.html', title: 'Hallazgo II: Sistemas de Información — RIPS' },
            { file: 'slide06.html', title: 'Hallazgo III: Inventarios y Control Logístico' },
            { file: 'slide07.html', title: 'Hallazgo IV: Inventarios — Exámenes de Laboratorio' },
            { file: 'slide08.html', title: 'Hallazgo V: Activos Fijos' },
            { file: 'slide09.html', title: 'Hallazgo VI: Tesorería y Conciliaciones Bancarias' },
            { file: 'slide10.html', title: 'Conclusión General' },
        ];

        let current = 0;

        // ── Build dots ─────────────────────────────────────
        const dotsEl = document.getElementById('dotsContainer');
        slides.forEach((s, i) => {
            const d = document.createElement('div');
            d.className = 'dot';
            d.dataset.title = s.title;
            d.addEventListener('click', () => goTo(i));
            dotsEl.appendChild(d);
        });

        document.getElementById('totNum').textContent = slides.length;

        // ── Navigation ─────────────────────────────────────
        function navigate(dir) { goTo(current + dir); }

        function goTo(index, direction = 'auto') {
            if (index < 0 || index >= slides.length || index === current) return;

            const isForward = direction === 'auto' ? index > current : direction === 1;
            const wrapper = document.getElementById('slideWrapper');

            wrapper.classList.add('fade-out');

            setTimeout(() => {
                current = index;
                const frame = document.getElementById('slideFrame');
                frame.src = slides[index].file;

                document.getElementById('slideTitle').textContent = slides[index].title;
                document.getElementById('currNum').textContent = index + 1;

                // Dots
                document.querySelectorAll('.dot').forEach((d, i) => {
                    d.classList.toggle('active', i === index);
                });

                // Buttons
                const atStart = index === 0;
                const atEnd   = index === slides.length - 1;
                ['btnPrev', 'arrowLeft'].forEach(id => {
                    document.getElementById(id).disabled = atStart;
                });
                ['btnNext', 'arrowRight'].forEach(id => {
                    document.getElementById(id).disabled = atEnd;
                });

                wrapper.classList.remove('fade-out');
            }, 220);
        }

        // Initial render
        goTo(0);

        // ── Keyboard ───────────────────────────────────────
        document.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowRight':
                case 'ArrowDown':
                case ' ':
                    e.preventDefault();
                    navigate(1);
                    break;
                case 'ArrowLeft':
                case 'ArrowUp':
                    e.preventDefault();
                    navigate(-1);
                    break;
                case 'Home':
                    e.preventDefault();
                    goTo(0);
                    break;
                case 'End':
                    e.preventDefault();
                    goTo(slides.length - 1);
                    break;
            }
        });

        // ── Scale to fit ───────────────────────────────────
        function scaleSlide() {
            const stage = document.querySelector('.stage');
            const availW = stage.clientWidth  - 120;   // arrowclearance
            const availH = stage.clientHeight - 24;

            const scaleX = availW / 1280;
            const scaleY = availH / 720;
            const scale  = Math.min(scaleX, scaleY, 1);

            document.getElementById('slideWrapper').style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', scaleSlide);
        scaleSlide();

        // ── Fullscreen ─────────────────────────────────────
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('btnFullscreen');
            if (document.fullscreenElement) {
                btn.innerHTML = '<i class="fa-solid fa-compress"></i> Salir';
            } else {
                btn.innerHTML = '<i class="fa-solid fa-expand"></i> Pantalla completa';
            }
            setTimeout(scaleSlide, 100);
        });
    </script>
</body>
</html>
